<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css/output.css" rel="stylesheet">
    <title>Document</title>
</head>
<body class="bg-black/90 flex flex-col h-[100vh]">
   <header class="flex justify-between items-center p-4 mt-4 w-[90%] mx-auto">
        <div class="relative w-[60%] lg:w-[30%]">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-gray-400">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                </svg>
            </div>
            <input type="search" id="input" placeholder="Search the vault..." class="w-full bg-[#1a1a24] text-white border border-gray-700 rounded-full py-3 pl-12 pr-4 focus:outline-none focus:border-purple-500 transition shadow-sm" >
        </div>
        
        <a href="panier.html" class="bg-[#6868b7] hover:bg-purple-600 border border-gray-700 hover:border-purple-500 text-white px-5 py-3 rounded-2xl flex items-center gap-3 font-bold transition-all shadow-sm group">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 group-hover:scale-110 transition-transform">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
            </svg>
            <span class="hidden md:inline tracking-wide">CART</span>
            <span id="cart-count" class="bg-purple-500 text-white rounded-full h-6 w-6 flex items-center justify-center text-sm shadow-[0_0_10px_rgba(168,85,247,0.5)]">0</span>
        </a>
    </header>
    <main class="flex flex-col  m-4 justify-center items-center">
        <div id="category" class="flex justify-center flex-wrap gap-3 my-8 w-[90%] mx-auto">
    <button  class="bg-purple-600 text-white px-6 py-2 rounded-full font-medium shadow-[0_0_15px_rgba(168,85,247,0.4)] transition-all cursor-pointer">All</button>
    <button data-name="Action" class="bg-[#1a1a24] text-gray-300 border border-gray-700 px-6 py-2 rounded-full font-medium hover:text-white hover:border-purple-500 hover:shadow-[0_0_10px_rgba(168,85,247,0.2)] transition-all cursor-pointer">Action</button>
    <button class="bg-[#1a1a24] text-gray-300 border border-gray-700 px-6 py-2 rounded-full font-medium hover:text-white hover:border-purple-500 hover:shadow-[0_0_10px_rgba(168,85,247,0.2)] transition-all cursor-pointer">RPG</button>
    <button class="bg-[#1a1a24] text-gray-300 border border-gray-700 px-6 py-2 rounded-full font-medium hover:text-white hover:border-purple-500 hover:shadow-[0_0_10px_rgba(168,85,247,0.2)] transition-all cursor-pointer">FPS</button>
    <button class="bg-[#1a1a24] text-gray-300 border border-gray-700 px-6 py-2 rounded-full font-medium hover:text-white hover:border-purple-500 hover:shadow-[0_0_10px_rgba(168,85,247,0.2)] transition-all cursor-pointer">Indie</button>
    <button class="bg-[#1a1a24] text-gray-300 border border-gray-700 px-6 py-2 rounded-full font-medium hover:text-white hover:border-purple-500 hover:shadow-[0_0_10px_rgba(168,85,247,0.2)] transition-all cursor-pointer">Strategy</button>
</div>
    
        <div id="games-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 w-[90%] mt-4">

        </div>
    </main>
</body>
<script src="data.js"></script>
<script type="module" src="./main.js"></script>
</html>
